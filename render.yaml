services:
  - type: web
    name: event-scraper-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: event-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
      - key: SERPER_API_KEY
        sync: false

databases:
  - name: event-db
    plan: free
